name: CI

on:
  push:
    branches: [dev, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install git-crypt (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y git-crypt

      - name: Install git-crypt (macOS)
        if: runner.os == 'macOS'
        run: brew install git-crypt

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --bin gitveil

      - name: Integration tests
        run: cargo test --test integration

      - name: Cross-compatibility tests
        run: cargo test --test cross_compat
